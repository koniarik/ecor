name: release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [debug, asan, ubsan, release]

    env:
      CC: gcc-15
      CXX: g++-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: install deps
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-15 g++-15

      - name: configure
        run: cmake --preset ${{ matrix.preset }}

      - name: build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --verbose

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: include/ecor/ecor.hpp
