name: test

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: run pre-commit
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        preset: [debug, asan, ubsan, release]

    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc-15' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++-15' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: install deps
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ninja-build clang gcc-15 g++-15

      - name: configure
        run: cmake --preset ${{ matrix.preset }}

      - name: build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --verbose
